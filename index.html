<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDREW ★ Official Portfolio Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="../node_modules/slick-carousel/slick/slick.css">
    <link rel="stylesheet" href="../node_modules/slick-carousel/slick/slick-theme.css">
</head>
<body> 
    <div class="wrapper fade-in">
        <div class="sub-wrapper fade-in">
            <header ng-controller="NavigationController" ng-click="refreshPage()"> 
                <h1 class="animate__animated animate__slideInLeft">JOHN ANDREW TUBALINAL</h1>
                <h3>OFFICIAL PORTFOLIO WEBSITE</h3> 
            </header>
            <navigation-page></navigation-page>
            <footer-page></footer-page>
        </div>
    </div>
    <div class="music-container">
        <audio id= "bg-music" controls="controls" onloadeddata="audioVolume()" autoplay>
            <source src="audio/bg-music.ogg"  type="audio/ogg">
        </audio>
    </div>
    <script>
        function audioVolume() {
        var myAudio = document.getElementById("bg-music");  
        myAudio.volume = 0.1;
        }
    </script>

    <!-- <div class="light-dark-mode">
        
    </div> -->

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="/node_modules/jquery/jquery.js"></script> 
    <script src="/node_modules/angular/angular.js"></script> 
    <script src="/node_modules/slick-carousel/slick/slick.js"></script> 
    <script src="/node_modules/angular-slick-carousel/dist/angular-slick.min.js"></script> 
    <script src="index.js"></script>
    <script src="navigation/navigation.js"></script>
    <script src="footer/footer.js"></script> 
    <script src="pages/development.js"></script>     
</body>
</html>
